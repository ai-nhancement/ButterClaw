<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: dark rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="#1a1a1a"/>

  <!-- Butter-gold claw marks: three curved slash strokes -->
  <!-- Left stroke -->
  <path d="M18 14 C16 22, 20 34, 22 50"
        stroke="#F5C842" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <!-- Center stroke -->
  <path d="M30 11 C27 21, 31 35, 32 52"
        stroke="#F5C842" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <!-- Right stroke -->
  <path d="M42 14 C41 24, 43 36, 42 50"
        stroke="#F5C842" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Subtle butter sheen highlight on center stroke -->
  <path d="M30 11 C27 21, 31 35, 32 52"
        stroke="#FFE07A" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
